<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name Crasher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --text: #f0f0f0;
    --text-muted: #888;
    --text-faint: #444;
    --accent: #1dce8f;
    --accent-dim: rgba(29,206,143,0.12);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-pill: 99px;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    min-height: 100vh;
  }

  /* subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 580px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 80px);
    font-weight: 400;
    letter-spacing: 5px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: lowercase;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    width: 100%;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  input[type="text"] {
    flex: 1;
    padding: 11px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-faint); font-size: 12px; }

  .btn {
    padding: 11px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background 0.12s, transform 0.1s, opacity 0.12s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-insert {
    background: var(--accent);
    color: #000;
    border-color: transparent;
    font-size: 13px;
    font-weight: 500;
    padding: 11px 22px;
    letter-spacing: 0.5px;
  }

  .btn-insert:hover { background: #1de8a0; }

  .row-label {
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    margin-right: 4px;
    text-transform: lowercase;
  }

  .pills-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 4px 12px;
    font-size: 11px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  .pill:hover { border-color: var(--border-strong); color: var(--text); }
  .pill.active { background: var(--accent); color: #000; border-color: transparent; font-weight: 500; }

  .nat-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  select {
    padding: 5px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: var(--accent); }

  .result-area {
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 1.25rem;
    margin-bottom: 1rem;
    position: relative;
    background: var(--surface2);
  }

  .result-placeholder {
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 1px;
  }

  .result-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2.5px;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
    word-break: break-word;
    width: 100%;
    display: none;
  }

  .result-text .new-word {
    color: var(--accent);
    background: var(--accent-dim);
    border-radius: 3px;
    padding: 0 4px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border-strong);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .count-label { font-size: 10px; color: var(--text-faint); letter-spacing: 1px; }

  .btn-sm {
    padding: 6px 12px;
    font-size: 10px;
    letter-spacing: 0.5px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 1rem;
    max-height: 180px;
    overflow-y: auto;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    background: var(--bg);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.1s;
    gap: 8px;
  }

  .history-item:hover { border-color: var(--border-strong); }

  .history-name {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    word-break: break-all;
  }

  .history-name .hl { color: var(--accent); }

  .nat-badge {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: var(--radius-pill);
    background: var(--surface2);
    color: var(--text-faint);
    border: 1px solid var(--border);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .err {
    font-size: 11px;
    color: #e24b4a;
    text-align: center;
    margin-top: 8px;
    display: none;
    letter-spacing: 0.5px;
  }

  @keyframes pop {
    0%   { transform: scale(0.88); opacity: 0; }
    65%  { transform: scale(1.03); }
    100% { transform: scale(1);    opacity: 1; }
  }

  .pop { animation: pop 0.2s ease forwards; }

  @media (max-width: 480px) {
    .card { padding: 1.25rem; }
    h1 { font-size: 52px; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>NAME <span>CRASHER</span></h1>
    <p class="subtitle">insert a live random name from a global database</p>
  </header>

  <div class="card">
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="e.g. Andre Stewart Junior Charles" />
      <button class="btn btn-insert" id="insertBtn" onclick="insertName()">insert</button>
    </div>

    <div class="pills-row">
      <span class="row-label">position</span>
      <button class="pill active" onclick="setPos('random',this)">random</button>
      <button class="pill" onclick="setPos('first',this)">first</button>
      <button class="pill" onclick="setPos('last',this)">last</button>
      <button class="pill" onclick="setPos('middle',this)">middle</button>
    </div>

    <div class="nat-row">
      <span class="row-label">name type</span>
      <button class="pill active" onclick="setNameType('last',this)">last name</button>
      <button class="pill" onclick="setNameType('first',this)">first name</button>
      <button class="pill" onclick="setNameType('both',this)">first + last</button>
      <select id="natSelect">
        <option value="">any nationality</option>
        <option value="au">australian</option>
        <option value="br">brazilian</option>
        <option value="ca">canadian</option>
        <option value="ch">swiss</option>
        <option value="de">german</option>
        <option value="dk">danish</option>
        <option value="es">spanish</option>
        <option value="fi">finnish</option>
        <option value="fr">french</option>
        <option value="gb">british</option>
        <option value="ie">irish</option>
        <option value="in">indian</option>
        <option value="ir">iranian</option>
        <option value="mx">mexican</option>
        <option value="nl">dutch</option>
        <option value="no">norwegian</option>
        <option value="nz">new zealand</option>
        <option value="rs">serbian</option>
        <option value="tr">turkish</option>
        <option value="ua">ukrainian</option>
        <option value="us">american</option>
      </select>
    </div>

    <div class="result-area" id="resultArea">
      <div class="spinner" id="spinner"></div>
      <span class="result-placeholder" id="placeholder">your crashed name appears here</span>
      <div class="result-text" id="resultText"></div>
    </div>
    <div class="err" id="errMsg">couldn't reach the name database — try again</div>

    <div class="bottom-row">
      <span class="count-label" id="countLabel"></span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-sm" onclick="clearAll()">clear</button>
        <button class="btn btn-sm" onclick="copyResult()" id="copyBtn">copy</button>
      </div>
    </div>

    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script>
  let position = 'random';
  let nameType = 'last';
  let history = [];
  let lastResult = '';
  let loading = false;

  function setPos(p, el) {
    position = p;
    el.closest('.pills-row').querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
  }

  function setNameType(t, el) {
    nameType = t;
    el.closest('.nat-row').querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
  }

  async function fetchRandomName() {
    const nat = document.getElementById('natSelect').value;
    let url = 'https://randomuser.me/api/?inc=name';
    if (nat) url += '&nat=' + nat;
    const res = await fetch(url);
    const data = await res.json();
    const n = data.results[0].name;
    if (nameType === 'last') return n.last;
    if (nameType === 'first') return n.first;
    return n.first + ' ' + n.last;
  }

  async function insertName() {
    if (loading) return;
    const input = document.getElementById('nameInput').value.trim();
    if (!input) { document.getElementById('nameInput').focus(); return; }

    loading = true;
    const btn = document.getElementById('insertBtn');
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('errMsg');
    btn.disabled = true;
    spinner.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('resultText').style.display = 'none';
    err.style.display = 'none';

    let newName;
    try {
      newName = await fetchRandomName();
    } catch(e) {
      err.style.display = 'block';
      spinner.style.display = 'none';
      btn.disabled = false;
      loading = false;
      document.getElementById('placeholder').style.display = 'block';
      return;
    }

    spinner.style.display = 'none';
    btn.disabled = false;
    loading = false;

    const words = input.split(/\s+/).filter(Boolean);
    let insertAt;
    if (position === 'first') insertAt = 0;
    else if (position === 'last') insertAt = words.length;
    else if (position === 'middle') {
      insertAt = words.length <= 1 ? (Math.random() < 0.5 ? 0 : 1) : Math.floor(words.length / 2);
    } else {
      insertAt = Math.floor(Math.random() * (words.length + 1));
    }

    const newWords = [...words];
    const insertWords = newName.split(' ');
    newWords.splice(insertAt, 0, ...insertWords);
    const full = newWords.join(' ');
    lastResult = full;

    const htmlParts = newWords.map((w, i) => {
      const isNew = i >= insertAt && i < insertAt + insertWords.length;
      return isNew ? `<span class="new-word">${w}</span>` : w;
    });

    const nat = document.getElementById('natSelect').value;
    const natLabel = nat ? nat.toUpperCase() : 'ANY';

    const resultEl = document.getElementById('resultText');
    resultEl.innerHTML = htmlParts.join(' ');
    resultEl.style.display = 'block';
    resultEl.classList.remove('pop');
    void resultEl.offsetWidth;
    resultEl.classList.add('pop');

    history.unshift({ original: input, result: full, name: newName, nat: natLabel });
    if (history.length > 12) history.pop();
    renderHistory();
    updateCount();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!history.length) { list.innerHTML = ''; return; }
    list.innerHTML = history.map((h, i) => {
      const parts = h.result.split(' ').map(w => {
        const isNew = h.name.split(' ').some(n => n.toLowerCase() === w.toLowerCase());
        return isNew ? `<span class="hl">${w}</span>` : w;
      }).join(' ');
      return `<div class="history-item" onclick="loadHistory(${i})">
        <span class="history-name">${parts}</span>
        <span class="nat-badge">${h.nat}</span>
      </div>`;
    }).join('');
  }

  function loadHistory(i) {
    document.getElementById('nameInput').value = history[i].original;
  }

  function updateCount() {
    document.getElementById('countLabel').textContent =
      history.length ? `${history.length} result${history.length > 1 ? 's' : ''}` : '';
  }

  function clearAll() {
    history = [];
    renderHistory();
    updateCount();
    document.getElementById('resultText').style.display = 'none';
    document.getElementById('placeholder').style.display = 'block';
    lastResult = '';
  }

  function copyResult() {
    if (!lastResult) return;
    navigator.clipboard.writeText(lastResult).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'copied!';
      setTimeout(() => btn.textContent = 'copy', 1500);
    });
  }

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') insertName();
  });
</script>
</body>
</html>
