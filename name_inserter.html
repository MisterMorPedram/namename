
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'DM Mono', monospace;
    background: var(--color-background-tertiary);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    font-weight: 400;
    letter-spacing: 3px;
    color: var(--color-text-primary);
    margin-bottom: 4px;
    line-height: 1;
  }

  .subtitle {
    font-size: 12px;
    color: var(--color-text-secondary);
    letter-spacing: 1px;
    margin-bottom: 2.5rem;
    text-transform: lowercase;
  }

  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 2rem;
    width: 100%;
    max-width: 560px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  #nameInput {
    flex: 1;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    outline: none;
    transition: border-color 0.15s;
  }

  #nameInput:focus {
    border-color: var(--color-border-primary);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
  }

  #nameInput::placeholder {
    color: var(--color-text-tertiary);
    font-size: 13px;
  }

  .btn {
    padding: 10px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--color-background-secondary); }
  .btn:active { transform: scale(0.97); }

  .btn-insert {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: transparent;
    font-size: 14px;
    padding: 10px 22px;
  }

  .btn-insert:hover { opacity: 0.85; background: var(--color-text-primary); }

  .controls-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .pill {
    padding: 5px 12px;
    font-size: 12px;
    border-radius: 99px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all 0.12s;
    font-family: 'DM Mono', monospace;
  }

  .pill.active {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: transparent;
  }

  label.pill-label {
    font-size: 11px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.5px;
    margin-right: 2px;
  }

  .result-area {
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 0.5px dashed var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }

  .result-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--color-text-primary);
    text-align: center;
    line-height: 1.2;
    word-break: break-all;
  }

  .result-placeholder {
    font-size: 13px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.5px;
  }

  .inserted-word {
    color: #1D9E75;
    position: relative;
  }

  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .history-label {
    font-size: 11px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.5px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 1.25rem;
    max-height: 160px;
    overflow-y: auto;
  }

  .history-item {
    font-size: 12px;
    color: var(--color-text-secondary);
    padding: 6px 10px;
    border-radius: var(--border-radius-md);
    background: var(--color-background-secondary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background 0.1s;
    font-family: 'DM Mono', monospace;
  }

  .history-item:hover { background: var(--color-background-tertiary); }

  .history-item span { color: #1D9E75; }

  .inserted-highlight {
    display: inline-block;
    background: rgba(29,158,117,0.12);
    border-radius: 3px;
    padding: 0 3px;
  }

  @keyframes pop {
    0% { transform: scale(0.9); opacity: 0; }
    60% { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: pop 0.22s ease forwards; }
</style>

<div id="app">
  <h1>Name Crasher</h1>
  <p class="subtitle">insert a random name anywhere in your name</p>

  <div class="card">
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="e.g. Andre Stewart Junior Charles" />
      <button class="btn btn-insert" onclick="insertName()">insert</button>
    </div>

    <div class="controls-row">
      <span class="pill-label">position</span>
      <button class="pill active" id="p-random" onclick="setPos('random', this)">random</button>
      <button class="pill" id="p-first" onclick="setPos('first', this)">first</button>
      <button class="pill" id="p-last" onclick="setPos('last', this)">last</button>
      <button class="pill" id="p-middle" onclick="setPos('middle', this)">middle</button>
    </div>

    <div class="result-area" id="resultArea">
      <span class="result-placeholder" id="resultPlaceholder">your crashed name appears here</span>
      <div class="result-text" id="resultText" style="display:none;"></div>
    </div>

    <div class="bottom-row">
      <span class="history-label" id="countLabel"></span>
      <div style="display:flex;gap:8px;">
        <button class="btn" onclick="clearHistory()" style="font-size:11px;padding:7px 12px;">clear history</button>
        <button class="btn" onclick="copyResult()" id="copyBtn" style="font-size:11px;padding:7px 12px;">copy</button>
      </div>
    </div>

    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script>
const NAMES = [
  "Ostos","Flores","Rivera","Mendez","Castillo","Vargas","Morales","Jimenez","Guerrero","Soto",
  "Reyes","Cruz","Ortega","Delgado","Ramos","Navarro","Vega","Herrera","Montoya","Salazar",
  "Patel","Singh","Kumar","Shah","Khan","Malik","Ahmed","Hassan","Ali","Hussain",
  "Chen","Wang","Zhang","Liu","Yang","Huang","Wu","Zhou","Xu","Sun",
  "Kowalski","Nowak","Wisnewski","Wojciechowski","Kozlowski","Kaminski","Lewandowski",
  "Smith","Johnson","Williams","Brown","Jones","Davis","Miller","Wilson","Moore","Taylor",
  "Jackson","Anderson","Thomas","Martin","White","Thompson","Garcia","Martinez","Robinson","Clark",
  "Dubois","Martin","Petit","Bernard","Robert","Richard","Dupont","Moreau","Simon","Laurent",
  "Nakamura","Tanaka","Suzuki","Watanabe","Yamamoto","Kobayashi","Ito","Kato","Yamada","Sato",
  "Kim","Lee","Park","Choi","Jung","Kang","Cho","Yoon","Jang","Lim",
  "Okonkwo","Adeyemi","Nwosu","Eze","Obi","Chukwu","Abubakar","Mohammed","Ibrahim","Musa",
  "Andersen","Hansen","Larsen","Pedersen","Christensen","Johansen","Nielsen","Thomsen",
  "Fernandez","Lopez","Gonzalez","Perez","Sanchez","Ramirez","Torres","Romero","Alonso","Molina",
  "Rossi","Ferrari","Esposito","Romano","Colombo","Ricci","Marino","Greco","Bruno","Gallo",
  "Beaumont","Leblanc","Leclerc","Tremblay","Gagnon","Roy","Morin","Lavoie","Fortin",
  "Dlamini","Mokoena","Nkosi","Sithole","Zulu","Ndlovu","Mthembu","Dube","Mahlangu",
  "Sousa","Ferreira","Santos","Oliveira","Costa","Carvalho","Almeida","Rodrigues",
  "Eriksson","Johansson","Nilsson","Magnusson","Karlsson","Lindqvist","Bergstrom",
  "Volkov","Ivanov","Petrov","Sokolov","Novikov","Morozov","Fedorov","Popov",
  "Al-Rashid","Khalid","Mansour","Farouk","Hamdan","Tariq","Nasser","Youssef",
  "Junior","Senior","Xavier","Valentine","Sterling","Prescott","Harrington","Ashford",
  "Blaze","Stone","Fox","Cash","Wolf","Hawk","Reed","Banks","Cross","Frost",
  "Pal","Dani","Stewart","Zak"
];

let position = 'random';
let history = [];
let lastResult = '';
let lastInserted = '';

function setPos(p, el) {
  position = p;
  document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
}

function getRandName() {
  return NAMES[Math.floor(Math.random() * NAMES.length)];
}

function insertName() {
  const input = document.getElementById('nameInput').value.trim();
  if (!input) {
    document.getElementById('nameInput').focus();
    return;
  }

  const words = input.split(/\s+/).filter(Boolean);
  const newName = getRandName();
  lastInserted = newName;

  let insertAt;
  if (position === 'first') insertAt = 0;
  else if (position === 'last') insertAt = words.length;
  else if (position === 'middle') {
    if (words.length <= 1) insertAt = Math.random() < 0.5 ? 0 : 1;
    else insertAt = Math.floor(words.length / 2);
  } else {
    insertAt = Math.floor(Math.random() * (words.length + 1));
  }

  const result = [...words];
  result.splice(insertAt, 0, newName);
  const full = result.join(' ');
  lastResult = full;

  const resultEl = document.getElementById('resultText');
  const ph = document.getElementById('resultPlaceholder');

  const htmlParts = result.map((w, i) => {
    if (i === insertAt) {
      return `<span class="inserted-highlight">${w}</span>`;
    }
    return w;
  });

  resultEl.innerHTML = htmlParts.join(' ');
  resultEl.style.display = 'block';
  ph.style.display = 'none';
  resultEl.classList.remove('pop');
  void resultEl.offsetWidth;
  resultEl.classList.add('pop');

  const posLabel = position === 'random' ? (
    insertAt === 0 ? 'first' : insertAt === result.length - 1 ? 'last' : `pos ${insertAt + 1}`
  ) : position;

  history.unshift({ original: input, result: full, name: newName, pos: posLabel });
  if (history.length > 12) history.pop();
  renderHistory();
  updateCount();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = history.map((h, i) =>
    `<div class="history-item" onclick="loadHistory(${i})">
      <span style="color:var(--color-text-secondary);font-size:11px;">${h.result.replace(h.name, '<span>' + h.name + '</span>')}</span>
      <span style="font-size:10px;color:var(--color-text-tertiary);margin-left:8px;white-space:nowrap;">+${h.name}</span>
    </div>`
  ).join('');
}

function loadHistory(i) {
  document.getElementById('nameInput').value = history[i].original;
}

function updateCount() {
  const el = document.getElementById('countLabel');
  el.textContent = history.length > 0 ? `${history.length} result${history.length > 1 ? 's' : ''}` : '';
}

function clearHistory() {
  history = [];
  renderHistory();
  updateCount();
  document.getElementById('resultText').style.display = 'none';
  document.getElementById('resultPlaceholder').style.display = 'block';
  lastResult = '';
}

function copyResult() {
  if (!lastResult) return;
  navigator.clipboard.writeText(lastResult).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = 'copy', 1500);
  });
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') insertName();
});
</script>
